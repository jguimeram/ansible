<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Afternoon</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --bed-color: #e94560;
            --skin-tone: #ffdbac;
            --hair-color: #483434;
            --pajama-color: #ffffff;
            --window-glow: rgba(135, 206, 235, 0.2);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* The Scene Container */
        .room {
            position: relative;
            width: 600px;
            height: 400px;
            background: #0f3460;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 4px solid #16213e;
        }

        /* Window Light */
        .window {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 120px;
            height: 160px;
            background: var(--window-glow);
            border: 3px solid #533483;
            box-shadow: 0 0 20px rgba(135, 206, 235, 0.1);
        }

        /* The Bed */
        .bed {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 500px;
            height: 180px;
            background: var(--bed-color);
            border-radius: 40px 40px 0 0;
            box-shadow: inset 0 20px 30px rgba(0, 0, 0, 0.2);
        }

        .pillow {
            position: absolute;
            top: -20px;
            left: 20px;
            width: 100px;
            height: 60px;
            background: #f1f1f1;
            border-radius: 15px;
            transform: rotate(-5deg);
        }

        /* The Girl */
        .girl {
            position: absolute;
            bottom: 60px;
            left: 80px;
            width: 400px;
            height: 100px;
            animation: breathe 4s ease-in-out infinite;
        }

        .hair {
            position: absolute;
            top: -10px;
            left: 0;
            width: 110px;
            height: 80px;
            background: var(--hair-color);
            border-radius: 50% 50% 30% 30%;
        }

        .face {
            position: absolute;
            top: 5px;
            left: 20px;
            width: 70px;
            height: 60px;
            background: var(--skin-tone);
            border-radius: 50%;
        }

        .eye {
            position: absolute;
            top: 30px;
            left: 45px;
            width: 10px;
            height: 2px;
            background: #333;
        }

        .body-pajamas {
            position: absolute;
            top: 35px;
            left: 85px;
            width: 200px;
            height: 65px;
            background: var(--pajama-color);
            border-radius: 30px 50px 20px 20px;
        }

        .legs {
            position: absolute;
            top: 45px;
            left: 270px;
            width: 120px;
            height: 50px;
            background: var(--skin-tone);
            border-radius: 0 20px 20px 0;
            border-left: 2px solid rgba(0, 0, 0, 0.1);
        }

        /* Floating particles for ambiance */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s linear infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }

        .overlay-text {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="room">
        <div class="window"></div>

        <div class="bed">
            <div class="pillow"></div>
            <div class="girl">
                <div class="hair"></div>
                <div class="face">
                    <div class="eye"></div>
                </div>
                <div class="body-pajamas"></div>
                <div class="legs"></div>
            </div>
        </div>

        <div class="overlay-text">Serenity</div>

        <div class="particle" style="width: 4px; height: 4px; left: 20%; top: 80%; animation-delay: 1s;"></div>
        <div class="particle" style="width: 6px; height: 6px; left: 50%; top: 70%; animation-delay: 3s;"></div>
        <div class="particle" style="width: 3px; height: 3px; left: 80%; top: 90%; animation-delay: 5s;"></div>
    </div>

</body>

</html>
